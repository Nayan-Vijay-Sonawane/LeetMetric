<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leet Metric</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <!-- Heading
        user
        stats -->
        <h1>LeetMetric</h1>

        <!-- user -->
        <div class="user-container">
            <p>Enter your username below: </p>
            <div class="user-input-container">
                <input type="text" placeholder="enter your username" id="user-input">
                <button id="search-btn">Search</button>
            </div>
        </div>

        <!-- stats -->
        <div class="user-stats-container">
            <div class="progress">
                <div class="progress-item ">
                    <div class="easy-progress circle">
                        <span id="easy-label">
                            <p>Easy</p>
                        </span>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="medium-progress circle">
                        <span id="medium-label">
                            <p>Medium</p>
                        </span>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="hard-progress circle">
                        <span id="hard-label">
                            <p>Hard</p>
                        </span>
                    </div>
                </div>
            </div>

            <div class="stats-card"></div>
            <!-- directly populate the card here from the JS code -->
        </div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
